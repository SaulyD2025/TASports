{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login page</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="login-container">
        <h1>Log in below:</h1>
        <ul class="logincontents">
            <form method="POST" class="loginform">
                {% csrf_token %}
                <li><p>Username:</p></li>
                <li>{{ form.username }}</li>
                <li><p>Password:</p></li>
                <li>{{ form.password }}</li>
                <button class="loginbutton" type="submit">Submit</button>
            </form>
        </ul>
    </div>
</body>
</html>
